name: Daily Commit Board

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:      # Allow manual runs

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ref: main
          persist-credentials: false

      - name: Set up Git config
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Check PAT token presence
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -z "$PAT_TOKEN" ]; then
            echo "PAT_TOKEN is missing!"
            exit 1
          else
            echo "PAT_TOKEN is set."
          fi

      - name: Make even commits based on day of week and push with PAT
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # date +%u → 1=Monday ... 7=Sunday — resets naturally each week
          DOW=$(date +%u)
          COMMITS=$(( DOW * 2 ))
          echo "Day $DOW of week → making $COMMITS commits"

          for i in $(seq 1 $COMMITS); do
            timestamp=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
            echo "Commit $i of $COMMITS — $timestamp" > last-updated.txt
            git add last-updated.txt
            git commit -m "Daily sync · commit $i/$COMMITS · $timestamp"
          done

          git remote remove origin
          git remote add origin https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git
          git push origin main
